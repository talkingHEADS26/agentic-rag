services:
  bot:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
